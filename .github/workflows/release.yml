# Automated changelog, version bump, npm publish, and GitHub Release (Changesets).
#
# Flow:
# 1. On feature PRs: run `bunx changeset` (or `bun run changeset`) and commit the generated file under .changeset/
# 2. Merge to main → this workflow opens "Version Packages" PR (changelog + package.json bump) if needed
# 3. Merge that PR → publishes to npm (prepack runs build) and creates GitHub Release
#
# Requires: repo secret NPM_TOKEN (npm "Automation" token).

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          version: bun run version-packages
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
